server:
  port: 9091
spring:
  Jackson:
    default-property-inclusion: non_empty
    # non_null makes your REST API responses cleaner by omitting null fields from JSON output.
    # other supported values non_empty Exclude null, empty collections, empty strings
    #default-property-inclusion: non_null
  application:
    name: activityService
  datasource:
    url: jdbc:h2:file:./target/h2/guide;AUTO_SERVER=TRUE
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: none

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    #for local running only
    drop-first: true




