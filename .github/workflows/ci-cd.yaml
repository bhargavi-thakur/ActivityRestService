name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Unit Tests Job
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project (skip tests)
        run: mvn clean install -DskipTests

      - name: Run Unit Tests
        run: mvn test

  # Integration Tests Job
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests   # optional: run after unit tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project (skip unit tests)
        run: mvn clean install -DskipTests

      - name: Run Integration Tests
        run: mvn verify -DskipUnitTests