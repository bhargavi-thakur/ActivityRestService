name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build project (skip tests)
        run: mvn clean install -DskipTests

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: built-project
          path: target/

  # Unit Tests Job (runs after build)
  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: built-project
          path: target/

      - name: Run Unit Tests
        run: mvn test

  # Integration Tests Job (runs after build, in parallel with unit-tests)
  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: built-project
          path: target/

      - name: Run Integration Tests
        run: mvn verify -DskipUnitTests